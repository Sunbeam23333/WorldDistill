# ============================================================================
# WorldDistill Model Zoo
# Registry of all supported video generation and world models
# ============================================================================

# Status: supported | partial | stub (interface only, implementation pending)
# Optional fields:
#   - aliases: additional user-facing aliases
#   - default_configs: task -> default inference config path under `inference/configs/`
#   - teacher_model_cls: canonical teacher model used by distilled/student variant
#   - distill_stage: base | teacher | student
#   - input_modalities / output_modalities / modalities: multimodal IO hints

models:
  # ======================== Video Generation Models ========================
  wan2.1:
    hf_repo: "Wan-AI/Wan2.1-T2V-14B"
    architecture: wan
    tasks: [t2v, i2v]
    runner_cls: "wan2.1"
    distill_methods: [step_distill, lora_distill, mean_flow_distill]
    status: supported

  wan2.1_distill:
    hf_repo: "Wan-AI/Wan2.1-T2V-14B"
    architecture: wan
    tasks: [t2v, i2v]
    runner_cls: "wan2.1_distill"
    distill_methods: [step_distill]
    teacher_model_cls: "wan2.1"
    distill_stage: student
    default_steps: 4
    status: supported

  wan2.1_mean_flow_distill:
    hf_repo: "Wan-AI/Wan2.1-T2V-14B"
    architecture: wan
    tasks: [t2v]
    runner_cls: "wan2.1_mean_flow_distill"
    distill_methods: [mean_flow_distill]
    teacher_model_cls: "wan2.1"
    distill_stage: student
    status: supported

  wan2.1_vace:
    hf_repo: "Wan-AI/Wan2.1-I2V-14B-720P"
    architecture: wan
    tasks: [vace]
    runner_cls: "wan2.1_vace"
    features: [video_editing]
    status: supported

  wan2.1_sf:
    hf_repo: "Wan-AI/Wan2.1-T2V-14B"
    architecture: wan
    tasks: [t2v]
    runner_cls: "wan2.1_sf"
    features: [self_forcing, streaming_generation]
    status: supported

  wan2.2_moe:
    hf_repo: "Wan-AI/Wan2.2-T2V-A14B"
    architecture: wan_moe
    tasks: [t2v, i2v]
    runner_cls: "wan2.2_moe"
    distill_methods: [step_distill, lora_distill, full_model_distill, fp8_distill]
    status: supported

  wan2.2_moe_distill:
    hf_repo: "lightx2v/Wan2.2-Distill-Models"
    architecture: wan_moe
    tasks: [t2v, i2v]
    runner_cls: "wan2.2_moe_distill"
    distill_methods: [step_distill]
    teacher_model_cls: "wan2.2_moe"
    distill_stage: student
    default_steps: 4
    dual_model: true  # high_noise + low_noise, boundary at step 2
    status: supported

  wan2.2_moe_vace:
    hf_repo: "lightx2v/Wan2.2-VACE"
    architecture: wan_moe
    tasks: [vace]
    runner_cls: "wan2.2_moe_vace"
    features: [video_editing]
    status: supported

  wan2.2_audio:
    hf_repo: "lightx2v/Wan2.2-Audio"
    architecture: wan_dense
    tasks: [s2v, rs2v]
    runner_cls: "wan2.2_audio"
    features: [audio_conditioning, streaming_generation]
    status: supported

  wan2.2_animate:
    hf_repo: "lightx2v/Wan2.2-Animate"
    architecture: wan_moe
    tasks: [animate]
    runner_cls: "wan2.2_animate"
    features: [motion_guidance, pose_conditioning]
    status: supported

  seko_talk:
    hf_repo: "lightx2v/SekoTalk"
    architecture: wan
    tasks: [s2v, rs2v]
    runner_cls: "seko_talk"
    features: [audio_conditioning, reference_speech]
    status: supported

  hunyuan_video_1.5:
    hf_repo: "tencent/HunyuanVideo"
    architecture: hunyuan_video
    tasks: [t2v, i2v]
    runner_cls: "hunyuan_video_1.5"
    distill_methods: [step_distill]
    status: supported

  hunyuan_video_1.5_distill:
    hf_repo: "tencent/HunyuanVideo"
    architecture: hunyuan_video
    tasks: [t2v, i2v]
    runner_cls: "hunyuan_video_1.5_distill"
    distill_methods: [step_distill]
    teacher_model_cls: "hunyuan_video_1.5"
    distill_stage: student
    default_steps: 4
    status: supported

  skyreels_v2:
    hf_repo: "Skywork/SkyReels-V2-T2V-14B"
    architecture: wan  # Based on Wan2.1 with 3D Causal VAE
    tasks: [t2v, i2v]
    runner_cls: "skyreels_v2"
    distill_methods: [stream_distill, step_distill]
    notes: "Diffusion Forcing framework, infinite-length generation"
    status: stub

  qwen_image:
    hf_repo: "Qwen/Qwen-Image-Edit-2511"
    architecture: dit
    tasks: [t2i, i2i]
    runner_cls: "qwen_image"
    aliases: [qwen-image, qwen-image-edit, qwen-image-edit-2511]
    checkpoint_formats: [directory, diffusers, quantized, state_dict]
    status: supported

  longcat_image:
    hf_repo: "megvii-research/LongCat-Flash-Image"
    architecture: dit
    tasks: [t2i, i2i]
    runner_cls: "longcat_image"
    aliases: [longcat-image]
    checkpoint_formats: [directory, diffusers, state_dict]
    status: supported

  z_image:
    hf_repo: "Tongyi-MAI/Z-Image-Turbo"
    architecture: dit
    tasks: [t2i, i2i]
    runner_cls: "z_image"
    aliases: [z-image]
    checkpoint_formats: [directory, diffusers, quantized, state_dict]
    status: supported

  ltx2:
    hf_repo: "Lightricks/LTX-Video"
    architecture: dit
    tasks: [t2v, i2v, t2av, i2av]
    runner_cls: "ltx2"
    checkpoint_formats: [directory, diffusers, state_dict]
    status: supported

  bagel:
    hf_repo: "ByteDance/Bagel"
    architecture: dit
    tasks: [t2i, i2i]
    runner_cls: "bagel"
    checkpoint_formats: [directory, diffusers, state_dict]
    status: supported

  # ======================== World Models ========================
  worldplay_distill:
    hf_repo: "tencent/HY-WorldPlay"
    architecture: hunyuan_video
    tasks: [t2v, i2v, game]
    runner_cls: "worldplay_distill"
    distill_methods: [step_distill, context_forcing]
    distill_stage: student
    features: [action_conditioning, prope_camera, context_memory]
    default_steps: 4
    status: supported

  lingbot_cam_moe:
    hf_repo: ""  # Set your HF repo here
    architecture: wan_moe
    tasks: [i2v]
    runner_cls: "lingbot_cam_moe"
    features: [plucker_camera_control]
    status: supported

  matrix_game_2:
    hf_repo: ""
    architecture: wan
    tasks: [game]
    runner_cls: "wan2.1_sf_mtxg2"
    distill_methods: [step_distill]
    features: [self_forcing, autoregressive]
    status: supported

  gamefactory:
    hf_repo: "KwaiVGI/GameFactory"
    architecture: custom
    tasks: [game]
    runner_cls: "gamefactory"
    paper: "https://arxiv.org/abs/2501.08325"
    notes: "ICCV 2025. Creates new games from pre-trained video generation models."
    status: stub

  gamecraft:
    hf_repo: "tencent/GameCraft-2"
    architecture: hunyuan_video
    tasks: [game]
    runner_cls: "gamecraft"
    distill_methods: [step_distill, context_forcing]
    features: [action_conditioning, prope_camera]
    paper: "https://arxiv.org/abs/2506.xxxxx"
    status: stub

  infinite_world:
    hf_repo: ""
    architecture: custom
    tasks: [game, open_world]
    runner_cls: "infinite_world"
    features: [infinite_generation, spatial_memory]
    paper: "https://arxiv.org/abs/2504.xxxxx"
    status: stub

  genie:
    hf_repo: ""
    architecture: custom_autoregressive
    tasks: [game]
    runner_cls: "genie"
    distill_methods: [progressive_distill]
    features: [autoregressive, latent_action]
    paper: "https://arxiv.org/abs/2402.15391"
    notes: "Google DeepMind. Foundation world model with latent action interface."
    status: stub

  gamegen_x:
    hf_repo: ""
    architecture: custom
    tasks: [game]
    runner_cls: "gamegen_x"
    features: [open_world_game_generation]
    paper: "https://arxiv.org/abs/2411.00769"
    status: stub

  vmem:
    hf_repo: ""
    architecture: memory_augmented
    tasks: [long_video, game]
    runner_cls: "vmem"
    distill_methods: [context_forcing]
    features: [visual_memory, long_range_context]
    status: stub

  spmem:
    hf_repo: ""
    architecture: memory_augmented
    tasks: [long_video, game]
    runner_cls: "spmem"
    distill_methods: [context_forcing]
    features: [spatial_memory, persistent_state]
    status: stub

  cam:
    hf_repo: ""
    architecture: memory_augmented
    tasks: [long_video]
    runner_cls: "cam"
    distill_methods: [context_forcing]
    features: [context_as_memory, fov_retrieval]
    notes: "Context as Memory approach for long video generation."
    status: stub

  mirage:
    hf_repo: ""
    architecture: custom
    tasks: [game]
    runner_cls: "mirage"
    distill_methods: [step_distill]
    notes: "Decart's real-time game world model."
    status: stub
